
 
services:
 
  logic-engine:
    build:
      context: ./logic-engine
      dockerfile: Dockerfile
    container_name: moodify-logic-engine
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
 
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: moodify-api-gateway
    ports:
      - "8080:8080"
    environment:
      - LOGIC_ENGINE_URL=http://logic-engine:8000
    depends_on:
      - logic-engine
    restart: unless-stopped
 
networks:
  default:
    name: moodify-network